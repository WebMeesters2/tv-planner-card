blueprint:
  name: TV Planner Card - Copy event to calendar
  description: >
    Script blueprint used by tv-planner-card to copy a selected calendar or
    HA-EPG item into a target Home Assistant calendar.
  domain: script
  input:
    target_calendar:
      name: Target calendar
      description: Calendar entity where copied events will be created.
      selector:
        entity:
          domain: calendar

fields:
  source_type:
    name: Source type
    required: false
    selector:
      text:

  source_calendar:
    name: Source calendar
    required: false
    selector:
      text:

  source_entity:
    name: Source entity
    required: false
    selector:
      text:

  summary:
    name: Summary
    required: true
    selector:
      text:

  description:
    name: Description
    required: false
    selector:
      text:
        multiline: true

  location:
    name: Location
    required: false
    selector:
      text:

  start_date_time:
    name: Start date/time
    required: true
    selector:
      text:

  end_date_time:
    name: End date/time
    required: true
    selector:
      text:

sequence:
  - action: calendar.create_event
    target:
      entity_id: !input target_calendar
    data:
      summary: "{{ summary }}"
      description: >-
        {{ description | default('') }}

        Copied from:
        source_type={{ source_type | default('') }}
        source_calendar={{ source_calendar | default('') }}
        source_entity={{ source_entity | default('') }}
      location: "{{ location | default('') }}"
      start_date_time: "{{ start_date_time }}"
      end_date_time: "{{ end_date_time }}"
